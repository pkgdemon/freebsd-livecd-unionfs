# freebsd-livecd default rc.conf
hostname="livecd"
sshd_enable="NO"
ifconfig_DEFAULT="DHCP"
keymap="us.kbd"

# DON'T let /etc/rc.d/root remount root r/w. From inside the chroot,
# mount(8) inspects the kernel mount table (getmntinfo), which reports
# the kernel's actual root mount -- cd9660 -- not our chroot's view.
# `mount -uw /` then dispatches mount_cd9660 -uw on the optical device
# and fails: "mount_cd9660: /dev/iso9660/LIVECD: Invalid argument".
# The gunion union backing our chroot is already r/w, so we don't need
# to remount anyway.
root_rw_mount="NO"

# Useful for first boot
clear_tmp_enable="YES"
syslogd_flags="-ss"
sendmail_enable="NONE"
dumpdev="NO"

# Run our smoke-test marker at the end of multi-user boot
local_startup="/etc/rc.d /usr/local/etc/rc.d"
